name: Export Course Summaries

on:
  workflow_dispatch:
    inputs:
      course_id:
        description: "Course ID(s) to export, comma-separated (e.g. 30004 or 30004,30005)"
        required: true
        type: string
      export_pdf:
        description: "Export as PDF attachment (uncheck to send as HTML email)"
        required: false
        type: boolean
        default: false
      sub_ids:
        description: "Optional comma-separated lecture sub_ids to filter (default: all summarized lectures)"
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install markdown pillow requests pygments

      - name: Install PDF dependencies
        if: inputs.export_pdf == true
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk libpango-1.0-0 libcairo2
          pip install weasyprint pygments
          sudo mkdir -p /usr/local/share/fonts/custom
          sudo cp assets/MSYH.TTC /usr/local/share/fonts/custom/
          sudo cp assets/MSYHBD.TTC /usr/local/share/fonts/custom/
          sudo cp assets/MSYHL.TTC /usr/local/share/fonts/custom/
          sudo fc-cache -fv

      - name: Fetch database from data branch
        run: |
          mkdir -p data
          if curl -fL -o data/icourse.db.gz.enc.tmp \
               "https://raw.githubusercontent.com/${{ github.repository }}/data/data/icourse.db.gz.enc" 2>/dev/null; then
            mv data/icourse.db.gz.enc.tmp data/icourse.db.gz.enc
            echo "Loaded compressed database."
          elif curl -fL -o data/icourse.db.enc.tmp \
               "https://raw.githubusercontent.com/${{ github.repository }}/data/data/icourse.db.enc" 2>/dev/null; then
            mv data/icourse.db.enc.tmp data/icourse.db.enc
            echo "Loaded legacy database."
          else
            echo "::error::No database found on data branch."
            exit 1
          fi

      - name: Decrypt database
        env:
          STUID: ${{ secrets.STUID }}
          UISPSW: ${{ secrets.UISPSW }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          NEW_KEY=$(printf '%s' "ICSv2:${STUID}:${UISPSW}" | sha256sum | cut -d' ' -f1)
          LEGACY_KEY="${STUID}${UISPSW}${DASHSCOPE_API_KEY}${SMTP_PASSWORD}"

          decrypt_blob() {
            local in_path="$1"
            local out_path="$2"
            if openssl enc -aes-256-cbc -d -pbkdf2 -iter 100000 \
                 -in "$in_path" -out "$out_path" \
                 -pass pass:"$NEW_KEY" 2>/dev/null; then
              return 0
            fi
            openssl enc -aes-256-cbc -d -pbkdf2 \
              -in "$in_path" -out "$out_path" \
              -pass pass:"$LEGACY_KEY" 2>/dev/null
          }

          if [ -f data/icourse.db.gz.enc ]; then
            decrypt_blob data/icourse.db.gz.enc data/icourse.db.gz
            gzip -d data/icourse.db.gz
          else
            decrypt_blob data/icourse.db.enc data/icourse.db
          fi
          echo "Database decrypted."

      - name: Export course summaries
        env:
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          EXPORT_COURSE_ID: ${{ inputs.course_id }}
          EXPORT_SUB_IDS: ${{ inputs.sub_ids }}
        run: |
          PDF_FLAG=""
          if [ "${{ inputs.export_pdf }}" = "true" ]; then
            PDF_FLAG="--pdf"
          fi
          if [ -n "$EXPORT_SUB_IDS" ]; then
            python scripts/export_course.py --course-id "$EXPORT_COURSE_ID" --sub-ids "$EXPORT_SUB_IDS" $PDF_FLAG
          else
            python scripts/export_course.py --course-id "$EXPORT_COURSE_ID" $PDF_FLAG
          fi
